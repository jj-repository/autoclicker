name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pynput evdev

    - name: Build Linux executable
      run: |
        pyinstaller --onefile --name Autoclicker-Linux --add-data "icon.png:." --add-data "takodachi.png:." autoclicker_evdev.py

    - name: Upload Linux artifacts
      uses: actions/upload-artifact@v7
      with:
        name: linux-executables
        path: |
          dist/Autoclicker-Linux

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pynput PyQt6

    - name: Build Windows executable
      run: |
        pyinstaller --onefile --windowed --name Autoclicker --icon=icon.ico --add-data "icon.ico;." --add-data "icon.png;." --add-data "takodachi.png;." autoclicker.py

    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v7
      with:
        name: windows-executables
        path: |
          dist/Autoclicker.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6

    - name: Download Linux artifacts
      uses: actions/download-artifact@v8
      with:
        name: linux-executables
        path: dist/linux

    - name: Download Windows artifacts
      uses: actions/download-artifact@v8
      with:
        name: windows-executables
        path: dist/windows

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/linux/Autoclicker-Linux
          dist/windows/Autoclicker.exe
        body: |
          ## Downloads

          | File | Platform |
          |------|----------|
          | **Autoclicker.exe** | Windows |
          | **Autoclicker-Linux** | Linux (requires sudo) |

          ## Installation

          ### Windows
          1. Download `Autoclicker.exe`
          2. Run it (may need Administrator privileges)

          ### Linux
          1. Download `Autoclicker-Linux`
          2. Make it executable: `chmod +x Autoclicker-Linux`
          3. Run with sudo: `sudo ./Autoclicker-Linux`

          ---
          Built automatically with GitHub Actions
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
