name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions: {}

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-linux.txt pyinstaller==6.13.0

    - name: Run tests
      run: python -m pytest test_autoclicker.py -v

    - name: Build Linux executable
      run: |
        pyinstaller --onefile --name Autoclicker-Linux --hidden-import autoclicker_core --add-data "icon.png:." --add-data "takodachi.png:." autoclicker_evdev.py

    - name: Upload Linux artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      with:
        name: linux-executables
        path: |
          dist/Autoclicker-Linux

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pyinstaller==6.13.0

    - name: Run tests
      run: python -m pytest test_autoclicker.py -v

    - name: Build Windows executable
      run: |
        pyinstaller --onefile --windowed --name Autoclicker --hidden-import autoclicker_core --icon=icon.ico --add-data "icon.ico;." --add-data "icon.png;." --add-data "takodachi.png;." autoclicker.py

    - name: Upload Windows artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      with:
        name: windows-executables
        path: |
          dist/Autoclicker.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Download Linux artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: linux-executables
        path: dist/linux

    - name: Download Windows artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: windows-executables
        path: dist/windows

    - name: Create Release
      uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
      with:
        files: |
          dist/linux/Autoclicker-Linux
          dist/windows/Autoclicker.exe
        body: |
          ## Downloads

          | File | Platform |
          |------|----------|
          | **Autoclicker.exe** | Windows |
          | **Autoclicker-Linux** | Linux (requires sudo) |

          ## Installation

          ### Windows
          1. Download `Autoclicker.exe`
          2. Run it (may need Administrator privileges)

          ### Linux
          1. Download `Autoclicker-Linux`
          2. Make it executable: `chmod +x Autoclicker-Linux`
          3. Run with sudo: `sudo ./Autoclicker-Linux`

          ---
          Built automatically with GitHub Actions
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
