name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pynput evdev

    - name: Build Linux executable
      run: |
        pyinstaller --onefile --name autoclicker-linux autoclicker_evdev.py

    - name: Upload Linux artifacts
      uses: actions/upload-artifact@v7
      with:
        name: linux-executables
        path: |
          dist/autoclicker-linux

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pynput

    - name: Build Windows executable
      run: |
        pyinstaller --onefile --windowed --name autoclicker-portable-win --add-data "takodachi.png;." autoclicker.py

    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v7
      with:
        name: windows-executables
        path: |
          dist/autoclicker-portable-win.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6

    - name: Download Linux artifacts
      uses: actions/download-artifact@v8
      with:
        name: linux-executables
        path: dist/linux

    - name: Download Windows artifacts
      uses: actions/download-artifact@v8
      with:
        name: windows-executables
        path: dist/windows

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/linux/autoclicker-linux
          dist/windows/autoclicker-portable-win.exe
        body: |
          ## Downloads

          | File | Platform |
          |------|----------|
          | **autoclicker-portable-win.exe** | Windows (portable) |
          | **autoclicker-linux** | Linux (requires sudo) |

          ## Installation

          ### Windows
          1. Download `autoclicker-portable-win.exe`
          2. Run it (may need Administrator privileges)

          ### Linux
          1. Download `autoclicker-linux`
          2. Make it executable: `chmod +x autoclicker-linux`
          3. Run with sudo: `sudo ./autoclicker-linux`

          ## What's New
          See commit history for detailed changes.

          ---
          Built automatically with GitHub Actions
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
